<!DOCTYPE html>
<html>

<head>

<title>Factory Worker Safety Monitoring</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
}

h1{
margin-top:20px;
}

.container{
width:80%;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

canvas{
max-width:100%;
}

.value{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

button{
margin:10px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#map{
height:400px;
}

.page{
display:none;
}

.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid black;
padding:10px;
}

</style>

</head>

<body>

<h1>Factory Worker Safety Monitoring</h1>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('workers')">Workers</button>
<button onclick="downloadReport()">Download Report</button>

<!-- DASHBOARD PAGE -->

<div id="dashboard" class="page active">

<div class="container">

<div class="card">

<h2>Gas Level</h2>
<div id="gasValue" class="value">--</div>
<canvas id="gasChart"></canvas>

</div>

<div class="card">

<h2>Temperature</h2>
<div id="tempValue" class="value">--</div>
<canvas id="tempChart"></canvas>

</div>

<div class="card">

<h2>Humidity</h2>
<div id="humValue" class="value">--</div>
<canvas id="humChart"></canvas>

</div>

<div class="card">

<h2>Hazard Map</h2>
<div id="map"></div>

</div>

</div>

</div>

<!-- WORKERS PAGE -->

<div id="workers" class="page">

<h2>Workers Details</h2>

<table>

<tr>
<th>Worker ID</th>
<th>Status</th>
<th>Gas</th>
<th>Temperature</th>
<th>Humidity</th>
</tr>

<tr>
<td>Worker 1</td>
<td>Active</td>
<td id="w1gas">--</td>
<td id="w1temp">--</td>
<td id="w1hum">--</td>
</tr>

<tr>
<td>Worker 2</td>
<td>Active</td>
<td id="w2gas">--</td>
<td id="w2temp">--</td>
<td id="w2hum">--</td>
</tr>

</table>

</div>

<script src="script.js"></script>

</body>

</html>
